# Upptime Status Page Configuration
# https://github.com/upptime/upptime
#
# TuxedoDrive Production Monitoring
# Monitors critical services supporting car wash operations
# Total services: 10 (internal APIs + external integrations)
#
# 🏈 BRAND VOICE & UX APPROACH
# ============================================================================
# This status page uses TuxedoDrive's friendly, supportive brand voice to help
# users understand their platform's health at a glance.
#
# Key design principles:
# 1. Emoji Icons: Each service has a clear emoji for quick visual identification
# 2. Service Categorization: Grouped by function (Core Platform, Payments, Email, etc.)
# 3. Helpful Descriptions: Comments explain what each service does and why it matters
# 4. Friendly Messaging: Intro text explains the page purpose in user-friendly language
# 5. Clear Action Items: Color codes (green/orange/red) guide users on what to do
# 6. Support-First Approach: Easy paths to get help when something goes wrong
#
# Services are organized in 6 logical categories:
# - 🏈 Internal Services (core platform)
# - 💳 Payment Processing (financial transactions)
# - 📧 Email Services (confirmations & alerts)
# - 📱 SMS & Messaging (quick notifications)
# - 🔐 Authentication & Services (login, weather, pollen)
# - 🏗️ Infrastructure (hosting & secrets)
#
# 🔧 MAINTENANCE NOTES
# ============================================================================
# When REMOVING a service: Also delete history/, api/, and graphs/ artifacts.
# When ADDING external APIs: Test with curl first, use broad expectedStatusCodes.
# See AGENTS.md for full details.

owner: tuxedodrive
repo: td-status
user-agent: Upptime (https://upptime.js.org)

# Services to monitor
# Internal services (our APIs) + External integrations (critical dependencies)
sites:
  # ============================================================================
  # 🏈 INTERNAL SERVICES - Our Car Wash Platform
  # ============================================================================
  # Your TuxedoDrive core experience. These are the systems we control.

  - name: 🚗 Production Application
    url: https://tuxedodrive.com/health
    icon: https://tuxedodrive.com/favicon.ico
    expectedStatusCodes:
      - 200
    timeout: 5000
    method: GET
    checkKeywords:
      - status
      - healthy

  - name: 📡 Edge API
    url: https://api.tuxedodrive.com/health
    expectedStatusCodes:
      - 200
    timeout: 5000
    method: GET
    checkKeywords:
      - status

  # ============================================================================
  # 💳 PAYMENT PROCESSING - Taking Care of Transactions
  # ============================================================================
  # Your customers' money moves safely through here.

  - name: 💰 Payments
    url: https://api.stripe.com/v1/charges
    expectedStatusCodes:
      - 400
      - 401
    timeout: 5000
    method: GET

  # ============================================================================
  # 📧 EMAIL SERVICES - Keeping Everyone Connected
  # ============================================================================
  # Confirmations, receipts, alerts.

  - name: 📬 Email Delivery
    url: https://api.postmarkapp.com/deliverystats
    expectedStatusCodes:
      - 401
      - 422
    timeout: 5000
    method: GET

  # ============================================================================
  # 📱 SMS & MESSAGING - Quick Notifications
  # ============================================================================
  # Text messages to your phone when it matters.

  - name: 💬 SMS Notifications
    url: https://api.twilio.com/
    expectedStatusCodes:
      - 200
      - 401
      - 403
    timeout: 5000
    method: GET

  # ============================================================================
  # 🔐 AUTHENTICATION & SERVICES
  # ============================================================================
  # Login, weather, and pollen data that power your platform.

  - name: 🔑 Authentication
    url: https://accounts.google.com/.well-known/openid-configuration
    expectedStatusCodes:
      - 200
    timeout: 5000
    method: GET

  - name: 🌤️ Weather Service
    url: https://api.openweathermap.org/data/2.5/weather
    expectedStatusCodes:
      - 401
    timeout: 5000
    method: GET

  - name: 🌸 Pollen Service
    url: https://pollen.googleapis.com/v1/forecast:lookup
    expectedStatusCodes:
      - 403
    timeout: 5000
    method: GET

  # ============================================================================
  # 🏗️ INFRASTRUCTURE - Where We Live
  # ============================================================================
  # The backbone keeping TuxedoDrive online 24/7.

  - name: 🚀 Hosting Platform
    url: https://status.render.com/
    expectedStatusCodes:
      - 200
    timeout: 5000
    method: GET

  - name: 🛡️ Secrets Management
    url: https://api.doppler.com/
    expectedStatusCodes:
      - 200
      - 302
      - 400
      - 401
    timeout: 5000
    method: GET

# Status website configuration
status-website:
  cname: status.tuxedodrive.dev
  logoUrl: https://raw.githubusercontent.com/tuxedodrive/td-status/main/TuxedoDrive-logo.png
  name: TuxedoDrive Status
  introTitle: "**Your car wash platform, always running**"
  introMessage: |
    Welcome to TuxedoDrive's status page. We monitor **10 critical systems** across our platform — from payment processing and email delivery, to SMS alerts and authentication — so you can focus on what matters: running a smooth car wash operation.

    **Everything green?** You're good to go. **Something orange or red?** We're already on it, and you'll see updates here. Questions? Drop us a line at engineering@tuxedodrive.com — we're here to help.
  navbar:
    - title: Status
      href: /
    - title: TuxedoDrive Website
      href: https://tuxedodrive.com
    - title: GitHub
      href: https://github.com/tuxedodrive/td-status
    - title: Support
      href: mailto:engineering@tuxedodrive.com
  navbar2:
    - rss: /feed.xml

# Response time display and charts
responseTimeChart:
  scale: hour

graphsPerPage: 12

# Brand colors
colors:
  success: "#10b981"    # Emerald green - service healthy
  degraded: "#f97316"   # Orange - service degraded
  down: "#ef4444"       # Red - service down

# Notifications (create issues when services go down)
# When a service goes down, we immediately open a GitHub issue and alert the team via email
notifications:
  - type: github-issue
    title: "🚨 Service Alert: $SITE_NAME is experiencing issues"
    assignees:
      - tuxedodrive
  - type: email
    to: engineering@tuxedodrive.com
    subject: "⚠️ TuxedoDrive Status Alert: $SITE_NAME"

# Monitoring schedules (cron format)
workflowSchedule:
  responseTime: "0 23 * * *"    # Daily @ 11 PM UTC
  graphs: "0 0 * * *"           # Daily @ midnight UTC
  checks: "*/5 * * * *"         # Every 5 minutes
  uptime: "0 */4 * * *"         # Every 4 hours
  trigger: "0 * * * *"          # Every hour for manual triggers
  site: "0 1 * * *"             # Daily @ 1 AM UTC

# Git commit details
commitMessages:
  commitAuthorName: "Upptime Bot"
  commitAuthorEmail: "bot@upptime.js.org"

# Status page features
statusPageTemplate: "Markdown"

# Keep 90 days of history (3 months)
history:
  lines: 90

# Number of failed checks before marking service as down
threshold: 5

# Additional features
averageResponse: true
responseTimeIndicator: true
charts: true

# i18n/copyright and footer
i18n:
  copyrightNotice: "Copyright © 2025 TuxedoDrive. All rights reserved. Keep your car wash running smoothly."
  links:
    - text: "📊 Real-time Status"
      href: "https://status.tuxedodrive.dev"
    - text: "🚗 Main Website"
      href: "https://tuxedodrive.com"
    - text: "🐙 GitHub"
      href: "https://github.com/tuxedodrive/td-status"
    - text: "💬 Support"
      href: "mailto:engineering@tuxedodrive.com"
